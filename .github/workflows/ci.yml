# Runs on every push / pull request. Spins up Postgres + Redis, installs deps,
# runs the test suite. The green check on GitHub is proof the code works —
# the first thing a reviewer (or recruiter) looks for.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: jarvis
          POSTGRES_PASSWORD: jarvis
          POSTGRES_DB: jarvis
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U jarvis"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://jarvis:jarvis@localhost:5432/jarvis
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests -q
